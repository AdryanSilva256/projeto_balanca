<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senha</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔐 LOGIN (APARECE PRIMEIRO) -->
<div id="loginTela" class="login-container">

    <h1>🔐 Acesso</h1>

    <div class="box">
        <input type="text" id="usuario" placeholder="Usuário">
    </div>

    <div class="box">
        <input type="password" id="senhaLogin" placeholder="Senha">
    </div>

    <button class="btn btn-verde" onclick="fazerLogin()">
        ENTRAR
    </button>

    <div id="erroLogin" class="erro"></div>

</div>


<!-- 🛠️ SISTEMA (COMEÇA ESCONDIDO) -->
<div id="sistema" style="display:none;">

    <div class="container">
        <h1>🔐 Gerador de Senha</h1>

        <div class="versao">
            Versão - 0.1.0
        </div>

        <div class="info">
            <div class="box">
                📅 <span id="data"></span>
            </div>

            <div class="box">
                ⏰ <span id="hora"></span>
            </div>
        </div>

        <button class="btn btn-verde" onclick="calcularSenha()">
            GERAR SENHA
        </button>

        <div class="senha" id="senha"></div>

        <hr>

        <button class="btn btn-azul" onclick="mostrarOutraData()">
            CALCULAR OUTRA DATA
        </button>

        <div class="area-data" id="areaData">

            <input type="date" id="dataEscolhida">

            <button class="btn btn-verde" onclick="calcularOutraData()">
                CALCULAR
            </button>

            <div class="senha2" id="senhaOutra"></div>

        </div>

    </div>

    <footer class="rodape">
        <p>Copyright © 2026 Todos os direitos reservados.</p>
    </footer>

</div>

<script src="script.js"></script>

</body>
</html>
